/* 轮播banner容器 */
.banner {
  width: 100%;

/* 首屏banner */
.banner {
  width: 100%;
  height: 500px;
  position: relative;
  overflow: hidden;
  background: #4CAF50;
}

/* 轮播图 */
.banner .slide {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.banner .slide:first-child {
  opacity: 1;
}

/* 标题文字（加pointer-events: none，不挡点击） */
.banner .banner-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 15;
  text-align: center;
  width: 100%;
  pointer-events: none; /* 关键：让文字不拦截点击 */
}
.banner .banner-text h1 {
  font-size: 48px;
  color: #fff;
  margin-bottom: 28px;
  text-shadow: 2px 2px 4px #000, 0 0 8px rgba(0,0,0,0.8);

.banner .banner-text p {
  font-size: 18px;
  color: #fff;
  text-shadow: 1px 1px 3px #000, 0 0 6px rgba(0,0,0,0.8);
}

/* 浅遮罩（加pointer-events: none，不挡点击） */
.banner::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.15);
  z-index: 10;
  pointer-events: none; /* 关键：让遮罩不拦截点击 */
}

/* 按钮和圆点（z-index要比遮罩和文字都高） */
.banner-btn {

<script>
  const slides = document.querySelectorAll('.slide');
  const indicators = document.querySelectorAll('.indicator');
  const prevBtn = document.querySelector('.prev-btn');
  const nextBtn = document.querySelector('.next-btn');
  let currentIndex = 0;
  let autoPlayTimer;

  // 更新轮播状态
  function updateBanner(index) {
    slides.forEach((slide, i) => {
      slide.style.opacity = i === index ? 1 : 0;
      indicators[i].classList.toggle('active', i === index);
    });
  }

  // 上一张
  prevBtn.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + slides.length) % slides.length;
    updateBanner(currentIndex);
    resetAutoPlay();
  });

  // 下一张
  nextBtn.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % slides.length;
    updateBanner(currentIndex);
    resetAutoPlay();
  });

  // 点击小圆点切换
  indicators.forEach((indicator, index) => {
    indicator.addEventListener('click', () => {
      currentIndex = index;
      updateBanner(currentIndex);
      resetAutoPlay();
    });
  });

  // 自动轮播
  function startAutoPlay() {
    autoPlayTimer = setInterval(() => {
      currentIndex = (currentIndex + 1) % slides.length;
      updateBanner(currentIndex);
    }, 3000);
  }

  // 重置自动轮播（点击后重新计时）
  function resetAutoPlay() {
    clearInterval(autoPlayTimer);
    startAutoPlay();
  }

  // 启动自动轮播
  startAutoPlay();
</script>
